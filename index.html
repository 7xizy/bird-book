<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦜 鳥類圖鑑｜服務帳號長期版</title>
  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jose/5.2.2/jose.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif; background:#f7f3eb; color:#3e3a34; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    :root {
      --surface:#fff; --bg:#f7f3eb; --border:#e0d9cd; --accent:#5a8a6e; --accent-light:#e8f2ea;
      --danger:#b85450; --shadow:0 2px 8px rgba(0,0,0,0.06);
      --topbar-h:56px;
    }
    .topbar { height:var(--topbar-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0; z-index:10; }
    .logo { font-weight:700; font-size:1.2rem; color:var(--accent); display:flex; align-items:center; gap:4px; }
    .search-box { flex:1; max-width:520px; position:relative; display:flex; align-items:center; }
    .search-box input { width:100%; padding:8px 12px 8px 36px; border:2px solid var(--border); border-radius:40px; font-size:0.9rem; background:var(--bg); }
    .search-box .icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#999; }
    .search-box .date-btn { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:var(--surface); border:2px solid var(--border); border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; z-index:2; }
    .btn { padding:6px 14px; border-radius:40px; border:2px solid var(--border); background:var(--surface); cursor:pointer; font-weight:600; font-size:0.85rem; display:flex; align-items:center; gap:4px; white-space:nowrap; transition:0.2s; color:inherit; text-decoration:none; }
    .btn:hover { background:var(--bg); }
    .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn.settings { background:#555; color:#fff; border-color:#555; }
    .main { display:flex; flex:1; overflow:hidden; }
    .sidebar { width:260px; background:var(--surface); border-right:1px solid var(--border); overflow-y:auto; padding:12px 8px; flex-shrink:0; }
    .sidebar h4 { font-size:0.7rem; text-transform:uppercase; color:#999; margin:12px 8px 4px; }
    .cat-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:0.9rem; margin:2px 0; transition:0.2s; }
    .cat-item.active { background:var(--accent-light); font-weight:700; }
    .cat-item .count { margin-left:auto; background:#eee; padding:2px 8px; border-radius:20px; font-size:0.75rem; }
    .cat-item .del-cat { display:none; margin-left:4px; color:var(--danger); cursor:pointer; font-weight:bold; }
    .cat-item:hover .del-cat { display:inline; }
    .content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .toolbar { padding:8px 16px; display:flex; gap:8px; align-items:center; background:var(--bg); flex-wrap:wrap; }
    .photo-grid { flex:1; overflow-y:auto; padding:12px; display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:12px; align-content:start; }
    .card { background:var(--surface); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; cursor:pointer; transition:0.2s; position:relative; border:3px solid transparent; }
    .card.selected { border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-light); }
    .card:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,0.1); }
    .card .thumb { width:100%; aspect-ratio:4/3; object-fit:cover; background:#ddd; display:flex; align-items:center; justify-content:center; font-size:2rem; position:relative; }
    .card .thumb img { width:100%; height:100%; object-fit:cover; }
    .card .raw-badge { position:absolute; bottom:4px; right:4px; background:rgba(0,0,0,0.7); color:#ffcc00; font-size:0.6rem; padding:2px 6px; border-radius:10px; }
    .card .info { padding:8px 10px; }
    .card .title { font-weight:600; font-size:0.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card .meta { font-size:0.7rem; color:#888; margin-top:2px; }
    .card .del-btn { position:absolute; top:6px; right:6px; background:rgba(255,255,255,0.9); border-radius:50%; width:24px; height:24px; display:none; align-items:center; justify-content:center; color:var(--danger); font-weight:bold; z-index:2; }
    .card:hover .del-btn { display:flex; }
    .detail-panel { width:360px; background:var(--surface); border-left:1px solid var(--border); overflow-y:auto; flex-shrink:0; transition:0.3s; }
    .detail-panel.hidden { width:0; overflow:hidden; border:none; }
    .detail-header { padding:12px; display:flex; gap:8px; align-items:center; border-bottom:1px solid var(--border); }
    .detail-header input { flex:1; padding:6px 10px; border:2px solid var(--border); border-radius:6px; }
    .detail-img { width:100%; aspect-ratio:4/3; object-fit:contain; background:#111; }
    .detail-actions { display:flex; gap:8px; margin:8px 12px; flex-wrap:wrap; }
    .detail-actions a, .detail-actions button { flex:1; text-align:center; padding:6px; border-radius:20px; border:2px solid var(--accent); color:var(--accent); background:var(--surface); cursor:pointer; font-weight:600; font-size:0.8rem; text-decoration:none; white-space:nowrap; }
    .detail-actions a:hover, .detail-actions button:hover { background:var(--accent); color:#fff; }
    .detail-section { padding:12px; border-bottom:1px solid #eee; }
    .exif-row { display:flex; justify-content:space-between; padding:4px 0; font-size:0.85rem; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:999; }
    .modal-box { background:#fff; padding:20px; border-radius:16px; width:90%; max-width:460px; max-height:80vh; overflow-y:auto; }
    .modal-box textarea, .modal-box input { width:100%; padding:8px; margin:4px 0; border:2px solid #ddd; border-radius:8px; font-family:monospace; }
    .date-popup { position:absolute; top:56px; right:0; background:#fff; border:2px solid var(--border); border-radius:12px; padding:12px; box-shadow:var(--shadow); z-index:50; display:none; }
    .date-popup input { margin:4px; padding:6px; border:2px solid var(--border); border-radius:8px; }
    .multi-actions { margin-left:auto; display:flex; gap:6px; align-items:center; }
  </style>
</head>
<body>
<div class="topbar">
  <div class="logo">🦜 鳥類圖鑑</div>
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="名稱/相機/鏡頭 或 年份(2024) 月份(2024-03) 區間">
    <span class="date-btn" id="dateBtn">📅</span>
    <div class="date-popup" id="datePopup">
      <label>開始日期</label>
      <input type="date" id="dateStart">
      <label>結束日期</label>
      <input type="date" id="dateEnd">
      <div style="display:flex; gap:6px; margin-top:8px;">
        <button class="btn" onclick="applyDateRange()">套用</button>
        <button class="btn" onclick="clearDateRange()">清除</button>
      </div>
    </div>
  </div>
  <button class="btn settings" onclick="openSettings()">⚙️ 設定</button>
  <button class="btn" onclick="document.getElementById('fileInput').click()">📁 上傳照片</button>
  <input type="file" id="fileInput" multiple accept="image/*,.arw,.cr2,.cr3,.nef,.dng,.orf,.rw2,.pef,.raf,.srw,.heic,.tiff,.tif" hidden>
  <button class="btn" onclick="toggleSidebar()">☰</button>
</div>

<!-- 設定彈窗 -->
<div class="modal" id="settingsModal" style="display:none;">
  <div class="modal-box">
    <h3>🔑 服務帳號設定（長期有效）</h3>
    <label>服務帳號 JSON 金鑰（貼上整個內容）</label>
    <textarea id="serviceAccountJson" rows="6" placeholder='{"type":"service_account","project_id":...}'></textarea>
    <label>目標根資料夾 ID（所有照片將放在此資料夾）</label>
    <input type="text" id="rootFolderId" placeholder="例如 1A2b3C4D5e6F7g8H9i0J">
    <label>API Key (選填，僅備用)</label>
    <input type="text" id="apiKeyInput" placeholder="AIzaSy...">
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button class="btn primary" onclick="saveServiceAccountSettings()">💾 儲存並連線</button>
      <button class="btn" onclick="document.getElementById('settingsModal').style.display='none'">取消</button>
    </div>
    <p style="font-size:0.75rem; color:#888; margin-top:8px;">
      儲存後即可長期使用，無需重新登入。請確保服務帳號 Email 已加入該資料夾的編輯者權限。
    </p>
  </div>
</div>

<div class="main">
  <aside class="sidebar" id="sidebar">
    <h4>📂 分類</h4>
    <div class="cat-item active" data-cat="all">📷 全部照片 <span class="count" id="countAll">0</span></div>
    <div class="cat-item" data-cat="uncategorized">❓ 未分類 <span class="count" id="countUncat">0</span></div>
    <div id="customCats"></div>
    <button class="btn" style="width:100%; margin-top:6px;" onclick="addCategory()">＋ 新增分類（雲端同步）</button>
    <h4>📸 相機</h4>
    <div id="cameraList"></div>
    <button class="btn" style="width:100%;" onclick="addFilter('camera')">＋ 新增相機條件</button>
    <h4>🔭 鏡頭</h4>
    <div id="lensList"></div>
    <button class="btn" style="width:100%;" onclick="addFilter('lens')">＋ 新增鏡頭條件</button>
  </aside>

  <div class="content">
    <div class="toolbar">
      <select id="sortSelect" onchange="renderGrid()">
        <option value="date-desc">最新優先</option>
        <option value="date-asc">最舊優先</option>
        <option value="name">名稱排序</option>
      </select>
      <span style="font-size:0.8rem; color:#888;">💡 拖曳照片到分類移動（雲端同步）</span>
      <div class="multi-actions" id="multiActions" style="display:none;">
        <span id="selectedCount">已選0張</span>
        <button class="btn" onclick="batchMoveCategory()">📂 批次移動</button>
        <button class="btn" onclick="copySelectedLinks()">📋 複製連結</button>
        <button class="btn" onclick="clearSelection()">取消選取</button>
      </div>
    </div>
    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <aside class="detail-panel hidden" id="detailPanel">
    <div class="detail-header">
      <input type="text" id="detailName" placeholder="照片名稱">
      <button class="btn" onclick="renamePhoto()">💾 儲存</button>
      <button class="btn" onclick="closeDetail()">✕</button>
    </div>
    <img class="detail-img" id="detailImg" src="" alt="">
    <div class="detail-actions">
      <a id="originalView" target="_blank">🔍 查看原始照片</a>
      <a id="originalDownload" download>⬇️ 下載原始照片</a>
      <button onclick="copyImageToClipboard()">📋 複製圖片</button>
    </div>
    <div class="detail-section">
      <select id="detailCat" onchange="changeCategory()"><option value="uncategorized">未分類</option></select>
      <button class="btn" style="color:var(--danger); margin-top:8px;" onclick="deletePhoto()">🗑️ 刪除照片（僅本地）</button>
    </div>
    <div class="detail-section" id="exifInfo">點擊照片查看 EXIF</div>
  </aside>
</div>

<script>
(function() {
  // ---------- 全域狀態 ----------
  let state = {
    photos: [],
    customCategories: [],
    cameraFilters: [],
    lensFilters: [],
    activeCat: 'all',
    activePhotoId: null,
    serviceAccount: null,   // 服務帳號 JSON 物件
    rootFolderId: null,
    apiKey: '',
    accessToken: null,      // 自動刷新
    selectedIds: new Set()
  };

  const localFileStore = new Map();
  const STORAGE_KEY = 'birdGuide_service_v1';

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      photosMeta: state.photos.map(p => ({
        id:p.id, name:p.name, category:p.category, exif:p.exif, rawFormat:p.rawFormat,
        dateAdded:p.dateAdded, thumbUrl:p.thumbUrl, fileName:p.fileName,
        fileSize:p.fileSize, isRaw:p.isRaw, driveFileId:p.driveFileId
      })),
      customCategories: state.customCategories,
      cameraFilters: state.cameraFilters,
      lensFilters: state.lensFilters,
      rootFolderId: state.rootFolderId,
      apiKey: state.apiKey,
      serviceAccount: state.serviceAccount   // 儲存金鑰（請注意安全）
    }));
  }
  function load() {
    let s = localStorage.getItem(STORAGE_KEY);
    if(s) {
      let d = JSON.parse(s);
      state.customCategories = d.customCategories || [];
      state.cameraFilters = d.cameraFilters || [];
      state.lensFilters = d.lensFilters || [];
      state.rootFolderId = d.rootFolderId || '';
      state.apiKey = d.apiKey || '';
      state.serviceAccount = d.serviceAccount || null;
      state.photos = (d.photosMeta||[]).map(p => ({...p, fileRef:null}));
    }
  }

  // ---------- 服務帳號 Token 刷新 ----------
  async function getAccessToken() {
    if (!state.serviceAccount) throw new Error('未設定服務帳號');
    if (state.accessToken && isTokenValid()) return state.accessToken;

    const sa = state.serviceAccount;
    const now = Math.floor(Date.now() / 1000);
    const payload = {
      iss: sa.client_email,
      scope: 'https://www.googleapis.com/auth/drive.file',
      aud: sa.token_uri || 'https://oauth2.googleapis.com/token',
      iat: now,
      exp: now + 3600
    };
    const header = { alg: 'RS256', typ: 'JWT' };
    const jose = window.jose;
    if (!jose) throw new Error('JOSE 程式庫未載入');
    const issuerSignKey = await jose.importPKCS8(sa.private_key, 'RS256');
    const jwt = await new jose.SignJWT(payload)
      .setProtectedHeader(header)
      .sign(issuerSignKey);

    const res = await fetch('https://oauth2.googleapis.com/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`
    });
    if (!res.ok) throw new Error('Token 刷新失敗');
    const data = await res.json();
    state.accessToken = data.access_token;
    state.tokenExpiresAt = Date.now() + (data.expires_in - 60) * 1000; // 提前60秒
    return state.accessToken;
  }

  function isTokenValid() {
    return state.accessToken && state.tokenExpiresAt && Date.now() < state.tokenExpiresAt;
  }

  // ---------- Drive API 工具 ----------
  async function driveRequest(url, options = {}) {
    let token = await getAccessToken();
    let headers = { ...options.headers, Authorization: 'Bearer ' + token };
    let res = await fetch(url, { ...options, headers });
    if (!res.ok) {
      let err = await res.text();
      throw new Error(err);
    }
    return res.json();
  }

  async function ensureRootFolder() {
    if (!state.rootFolderId) throw new Error('請先設定目標資料夾 ID');
    return state.rootFolderId;
  }

  async function createCategoryFolder(catName) {
    let rootId = await ensureRootFolder();
    let metadata = { name: catName, mimeType: 'application/vnd.google-apps.folder', parents: [rootId] };
    let folder = await driveRequest('https://www.googleapis.com/drive/v3/files', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(metadata)
    });
    return folder.id;
  }

  async function uploadFileToDrive(file, parentId) {
    let metadata = { name: file.name, parents: [parentId] };
    let form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    form.append('file', file);
    let token = await getAccessToken();
    let res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token },
      body: form
    });
    if (!res.ok) throw new Error('上傳失敗');
    return (await res.json()).id;
  }

  async function moveFileToFolder(fileId, fromFolderId, toFolderId) {
    let params = new URLSearchParams({ addParents: toFolderId, removeParents: fromFolderId || '' });
    let token = await getAccessToken();
    await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?${params}`, {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + token }
    });
  }

  // ---------- 設定儲存 ----------
  window.openSettings = () => {
    document.getElementById('serviceAccountJson').value = state.serviceAccount ? JSON.stringify(state.serviceAccount, null, 2) : '';
    document.getElementById('rootFolderId').value = state.rootFolderId || '';
    document.getElementById('apiKeyInput').value = state.apiKey || '';
    document.getElementById('settingsModal').style.display = 'flex';
  };

  window.saveServiceAccountSettings = async function() {
    let jsonStr = document.getElementById('serviceAccountJson').value.trim();
    let rootId = document.getElementById('rootFolderId').value.trim();
    let apiKey = document.getElementById('apiKeyInput').value.trim();
    if (!jsonStr || !rootId) { alert('請填寫服務帳號 JSON 與根資料夾 ID'); return; }
    try {
      state.serviceAccount = JSON.parse(jsonStr);
      state.rootFolderId = rootId;
      state.apiKey = apiKey;
      // 測試連線
      await getAccessToken();
      save();
      document.getElementById('settingsModal').style.display = 'none';
      alert('設定成功！現在可以上傳照片到雲端了。');
    } catch(e) {
      alert('設定失敗：' + e.message);
    }
  };

  // ---------- EXIF / RAW ----------
  async function readExif(file) {
    try {
      return await exifr.parse(file, {
        pick:['Make','Model','LensModel','FocalLength','FNumber','ExposureTime','ISO','DateTimeOriginal','CreateDate'],
        reviveValues:true
      });
    } catch(e) { return null; }
  }

  function formatShutterSpeed(sec) {
    if(!sec && sec!==0) return '';
    let s = parseFloat(sec);
    if(isNaN(s)) return sec+'s';
    if(s >= 1) return s + ' 秒';
    let denom = Math.round(1/s);
    if(Math.abs(s - 1/denom) < 0.001) return `1/${denom} 秒`;
    return s.toFixed(4).replace(/0+$/,'') + ' 秒';
  }

  function getRawFormat(fn) {
    let ext = fn.split('.').pop().toLowerCase();
    let map = { arw:'SONY ARW', cr2:'Canon CR2', cr3:'Canon CR3', nef:'Nikon NEF', dng:'Adobe DNG' };
    return map[ext] || null;
  }

  async function extractRawThumb(file) {
    try {
      let t = await exifr.thumbnail(file);
      if(t) { let b = new Blob([t],{type:'image/jpeg'}); return URL.createObjectURL(b); }
    } catch(e){}
    return null;
  }

  // ---------- 照片上傳 ----------
  async function handleUpload(files) {
    if (!state.serviceAccount) { alert('請先設定服務帳號金鑰'); return; }
    let rootId = await ensureRootFolder();
    for(let f of files) {
      let id = genId(), raw = getRawFormat(f.name), isRaw = !!raw;
      let exif = await readExif(f);
      let thumb = isRaw ? await extractRawThumb(f) : (f.type.startsWith('image/') ? URL.createObjectURL(f) : null);
      let driveFileId;
      try { driveFileId = await uploadFileToDrive(f, rootId); }
      catch(e) { alert(`上傳 ${f.name} 失敗：${e.message}`); continue; }
      let photo = {
        id, name:f.name, category:'uncategorized', thumbUrl:thumb,
        fileRef:f, exif, rawFormat:raw, isRaw, dateAdded:new Date().toISOString(),
        fileName:f.name, fileSize:f.size, driveFileId
      };
      state.photos.push(photo);
      localFileStore.set(id, { blobUrl: URL.createObjectURL(f), fileName: f.name });
    }
    save(); renderAll();
  }

  // ---------- 分類與移動 ----------
  window.addCategory = async function() {
    if (!state.serviceAccount) { alert('請先設定服務帳號'); return; }
    let name = prompt('輸入分類名稱：');
    if(!name) return;
    if(state.customCategories.find(c=>c.name===name)) { alert('分類已存在'); return; }
    try {
      let folderId = await createCategoryFolder(name);
      state.customCategories.push({ name, driveFolderId: folderId });
      save(); renderAll();
    } catch(e) { alert('建立失敗：'+e.message); }
  };

  async function movePhotoToCategory(photoId, targetCat) {
    let photo = state.photos.find(p=>p.id===photoId);
    if(!photo) return;
    let oldCat = photo.category;
    if(oldCat === targetCat) return;
    if(photo.driveFileId && state.serviceAccount) {
      try {
        let fromId = oldCat==='uncategorized' ? state.rootFolderId : state.customCategories.find(c=>c.name===oldCat)?.driveFolderId;
        let toId = targetCat==='uncategorized' ? state.rootFolderId : state.customCategories.find(c=>c.name===targetCat)?.driveFolderId;
        if(toId) await moveFileToFolder(photo.driveFileId, fromId, toId);
      } catch(e) { alert('雲端移動失敗：'+e.message); return; }
    }
    photo.category = targetCat;
    save(); renderAll();
  }

  function setupSidebarDrop() {
    document.querySelectorAll('.sidebar .cat-item').forEach(el => {
      el.addEventListener('dragover', e => e.preventDefault());
      el.addEventListener('drop', e => {
        e.preventDefault();
        let photoId = e.dataTransfer.getData('text/plain');
        let targetCat = el.dataset.cat;
        if(targetCat && targetCat !== 'all' && !targetCat.startsWith('camera:') && !targetCat.startsWith('lens:')) {
          movePhotoToCategory(photoId, targetCat);
        }
      });
    });
  }

  // 其他功能（搜尋、詳情、EXIF、多選等）已在前述版本完整，此處省略重複部分，但保留核心叫用
  function renderAll() { renderSidebar(); renderGrid(); updateSelectionUI(); }

  // 初始化
  window.addEventListener('load', () => {
    load();
    // 若有服務帳號設定，預先嘗試取得 token
    if (state.serviceAccount) {
      getAccessToken().catch(e => console.warn('自動刷新 token 失敗', e));
    }
    renderAll();
    document.getElementById('fileInput').onchange = e => {
      if(e.target.files.length) { handleUpload(e.target.files); e.target.value = ''; }
    };
    // ... 其他事件綁定
  });
})();
</script>
</body>
</html>
