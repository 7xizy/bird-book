<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🦜 鳥類圖鑑｜攝影管理</title>
    <!-- exifr 完整版 -->
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
    <!-- Google Identity Services 用於 OAuth -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif; background:#f7f3eb; color:#3e3a34; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        :root {
            --surface:#fff; --bg:#f7f3eb; --border:#e0d9cd; --accent:#5a8a6e; --accent-light:#e8f2ea;
            --danger:#b85450; --danger-light:#fce8e6; --shadow:0 2px 8px rgba(0,0,0,0.06);
            --sidebar-w:260px; --detail-w:360px; --topbar-h:56px;
        }
        /* 頂部列 */
        .topbar { height:var(--topbar-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0; z-index:100; }
        .logo { font-weight:700; font-size:1.2rem; color:var(--accent); display:flex; align-items:center; gap:4px; }
        .search-box { flex:1; max-width:420px; position:relative; }
        .search-box input { width:100%; padding:8px 12px 8px 36px; border:2px solid var(--border); border-radius:40px; font-size:0.9rem; background:var(--bg); }
        .search-box .icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#999; }
        .btn { padding:6px 14px; border-radius:40px; border:2px solid var(--border); background:var(--surface); cursor:pointer; font-weight:600; font-size:0.85rem; display:flex; align-items:center; gap:4px; white-space:nowrap; }
        .btn:hover { background:var(--bg); }
        .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
        .btn.drive { background:#1a73e8; color:#fff; border-color:#1a73e8; }

        /* 主佈局 */
        .main { display:flex; flex:1; overflow:hidden; }
        .sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); overflow-y:auto; padding:12px 8px; flex-shrink:0; }
        .sidebar h4 { font-size:0.7rem; text-transform:uppercase; color:#999; margin:12px 8px 4px; }
        .sidebar .cat-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:0.9rem; margin:2px 0; }
        .sidebar .cat-item.active { background:var(--accent-light); font-weight:700; }
        .sidebar .cat-item .count { margin-left:auto; background:#eee; padding:2px 8px; border-radius:20px; font-size:0.75rem; }
        .sidebar .cat-item .del-cat { display:none; margin-left:4px; color:var(--danger); cursor:pointer; }
        .sidebar .cat-item:hover .del-cat { display:inline; }
        .content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .toolbar { padding:8px 16px; display:flex; gap:8px; align-items:center; background:var(--bg); }
        .photo-grid { flex:1; overflow-y:auto; padding:12px; display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:12px; align-content:start; }
        .card { background:var(--surface); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; cursor:pointer; transition:0.2s; position:relative; }
        .card:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,0.1); }
        .card .thumb { width:100%; aspect-ratio:4/3; object-fit:cover; background:#ddd; display:flex; align-items:center; justify-content:center; font-size:2rem; }
        .card .thumb img { width:100%; height:100%; object-fit:cover; }
        .card .info { padding:8px 10px; }
        .card .title { font-weight:600; font-size:0.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .card .meta { font-size:0.7rem; color:#888; margin-top:2px; }
        .card .del-btn { position:absolute; top:6px; right:6px; background:rgba(255,255,255,0.9); border-radius:50%; width:24px; height:24px; display:none; align-items:center; justify-content:center; color:var(--danger); font-weight:bold; }
        .card:hover .del-btn { display:flex; }
        /* 詳情面板 */
        .detail-panel { width:var(--detail-w); background:var(--surface); border-left:1px solid var(--border); overflow-y:auto; flex-shrink:0; transition:0.3s; }
        .detail-panel.hidden { width:0; overflow:hidden; border:none; }
        .detail-header { padding:12px; display:flex; gap:8px; align-items:center; border-bottom:1px solid var(--border); }
        .detail-header input { flex:1; padding:6px 10px; border:2px solid var(--border); border-radius:6px; }
        .detail-img { width:100%; aspect-ratio:4/3; object-fit:contain; background:#111; }
        .detail-section { padding:12px; border-bottom:1px solid #eee; }
        .exif-row { display:flex; justify-content:space-between; padding:4px 0; font-size:0.85rem; }
        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:999; }
        .modal-box { background:#fff; padding:20px; border-radius:16px; width:90%; max-width:400px; }
        .modal-box input { width:100%; padding:8px; margin:4px 0; border:2px solid #ddd; border-radius:8px; }
        .flex-row { display:flex; gap:8px; align-items:center; }
    </style>
</head>
<body>
<div class="topbar">
    <div class="logo">🦜 鳥類圖鑑</div>
    <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="名稱/相機/鏡頭 或日期區間 2024-01..2024-03">
    </div>
    <button class="btn" onclick="document.getElementById('fileInput').click()">📁 上傳</button>
    <input type="file" id="fileInput" multiple accept="image/*,.arw,.cr2,.cr3,.nef,.dng,.orf,.rw2,.pef,.raf,.srw,.heic,.tiff,.tif" hidden>
    <button class="btn drive" id="driveBtn" onclick="openDriveAuth()">🔗 Google Drive</button>
    <button class="btn" onclick="toggleSidebar()">☰</button>
</div>

<div class="main">
    <aside class="sidebar" id="sidebar">
        <h4>📂 分類</h4>
        <div class="cat-item active" data-cat="all">📷 全部照片 <span class="count" id="countAll">0</span></div>
        <div class="cat-item" data-cat="uncategorized">❓ 未分類 <span class="count" id="countUncat">0</span></div>
        <div id="customCats"></div>
        <button class="btn" style="width:100%; margin-top:6px;" onclick="addCategory()">＋ 新增分類</button>
        <h4>📸 相機</h4>
        <div id="cameraList"></div>
        <button class="btn" style="width:100%;" onclick="addFilter('camera')">＋ 新增相機條件</button>
        <h4>🔭 鏡頭</h4>
        <div id="lensList"></div>
        <button class="btn" style="width:100%;" onclick="addFilter('lens')">＋ 新增鏡頭條件</button>
    </aside>

    <div class="content">
        <div class="toolbar">
            <select id="sortSelect" onchange="renderGrid()">
                <option value="date-desc">最新優先</option>
                <option value="date-asc">最舊優先</option>
                <option value="name">名稱排序</option>
            </select>
            <span style="margin-left:auto; font-size:0.8rem; color:#888;">拖曳照片到分類可移動</span>
        </div>
        <div class="photo-grid" id="photoGrid"></div>
    </div>

    <aside class="detail-panel hidden" id="detailPanel">
        <div class="detail-header">
            <input type="text" id="detailName" placeholder="照片名稱">
            <button class="btn" onclick="renamePhoto()">💾 儲存</button>
            <button class="btn" onclick="closeDetail()">✕</button>
        </div>
        <img class="detail-img" id="detailImg" src="" alt="">
        <a id="originalLink" target="_blank" style="display:block; text-align:center; color:var(--accent); padding:4px;">🔍 查看原始照片</a>
        <div class="detail-section">
            <select id="detailCat" onchange="changeCategory()">
                <option value="uncategorized">未分類</option>
            </select>
            <button class="btn" style="color:var(--danger); margin-top:8px;" onclick="deletePhoto()">🗑️ 刪除照片 (僅本地)</button>
        </div>
        <div class="detail-section" id="exifInfo">點擊照片查看 EXIF</div>
    </aside>
</div>

<!-- Google Drive 授權彈窗 -->
<div class="modal" id="driveModal" style="display:none;">
    <div class="modal-box">
        <h3>Google Drive 設定</h3>
        <label>OAuth 2.0 用戶端 ID</label>
        <input type="text" id="clientIdInput" placeholder="xxxxx.apps.googleusercontent.com">
        <label>資料夾 ID (可選)</label>
        <input type="text" id="folderIdInput" placeholder="留空則使用根目錄">
        <button class="btn primary" onclick="startDriveAuth()" style="width:100%; margin:8px 0;">🔐 登入 Google 並授權</button>
        <button class="btn" onclick="document.getElementById('driveModal').style.display='none'">取消</button>
    </div>
</div>

<!-- 新增分類/條件彈窗 -->
<div class="modal" id="addModal" style="display:none;">
    <div class="modal-box">
        <h3 id="addModalTitle">新增</h3>
        <input type="text" id="addInput" placeholder="名稱">
        <div class="flex-row">
            <button class="btn primary" onclick="confirmAdd()">確定</button>
            <button class="btn" onclick="document.getElementById('addModal').style.display='none'">取消</button>
        </div>
    </div>
</div>

<script>
(function() {
    // 狀態管理
    const STORAGE_KEY = 'birdGuide_v3';
    let state = {
        photos: [],
        customCategories: [],
        cameraFilters: [],   // 使用者自行增加的相機篩選文字
        lensFilters: [],
        activeCat: 'all',
        activePhotoId: null,
        google: { clientId:'', token:null, folderId:'' }
    };

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            photosMeta: state.photos.map(p => ({
                id:p.id, name:p.name, category:p.category, exif:p.exif, rawFormat:p.rawFormat,
                dateAdded:p.dateAdded, driveId:p.driveId, thumbUrl:p.thumbUrl && !p.thumbUrl.startsWith('blob:')?p.thumbUrl:null
            })),
            customCategories: state.customCategories,
            cameraFilters: state.cameraFilters,
            lensFilters: state.lensFilters,
            google: state.google
        }));
    }

    function load() {
        let saved = localStorage.getItem(STORAGE_KEY);
        if(saved) {
            let s = JSON.parse(saved);
            state.customCategories = s.customCategories || [];
            state.cameraFilters = s.cameraFilters || [];
            state.lensFilters = s.lensFilters || [];
            state.google = s.google || {clientId:'',token:null,folderId:''};
            state.photos = (s.photosMeta||[]).map(p => ({
                ...p, fileRef:null, thumbUrl:p.thumbUrl||null
            }));
        }
    }

    function genId() { return 'p_'+Date.now()+'_'+Math.random().toString(36); }

    // EXIF 讀取
    async function readExif(file) {
        try {
            return await exifr.parse(file, {
                pick:['Make','Model','LensModel','FocalLength','FNumber','ExposureTime','ISO',
                      'DateTimeOriginal','CreateDate','ImageWidth','ImageHeight'],
                reviveValues:true
            });
        } catch(e) { return null; }
    }

    function getRawFormat(name) {
        let ext = name.split('.').pop().toLowerCase();
        let map = { arw:'SONY ARW', cr2:'Canon CR2', cr3:'Canon CR3', nef:'Nikon NEF', dng:'Adobe DNG' };
        return map[ext] || null;
    }

    // 上傳處理（含 Drive 上傳）
    async function handleUpload(files) {
        for(let file of files) {
            let id = genId();
            let raw = getRawFormat(file.name);
            let exif = await readExif(file);
            let thumb = file.type.startsWith('image/') ? URL.createObjectURL(file) : null;
            let photo = {
                id, name:file.name, category:'uncategorized', thumbUrl:thumb,
                fileRef:file, exif, rawFormat:raw, dateAdded:new Date().toISOString(), driveId:null
            };
            // 如果有 Google 授權，上傳到 Drive
            if(state.google.token && state.google.folderId) {
                try {
                    let metadata = { name:file.name, parents:[state.google.folderId] };
                    let form = new FormData();
                    form.append('metadata', new Blob([JSON.stringify(metadata)], {type:'application/json'}));
                    form.append('file', file);
                    let res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                        method:'POST',
                        headers: { 'Authorization':'Bearer '+state.google.token },
                        body: form
                    });
                    let data = await res.json();
                    if(data.id) photo.driveId = data.id;
                } catch(e) { console.warn('Drive上傳失敗', e); }
            }
            state.photos.push(photo);
        }
        save(); renderAll();
    }

    // 重命名
    async function renamePhoto() {
        let photo = state.photos.find(p=>p.id===state.activePhotoId);
        if(!photo) return;
        let newName = document.getElementById('detailName').value.trim();
        if(!newName) return;
        photo.name = newName;
        if(photo.driveId && state.google.token) {
            await fetch(`https://www.googleapis.com/drive/v3/files/${photo.driveId}`, {
                method:'PATCH',
                headers: { 'Authorization':'Bearer '+state.google.token, 'Content-Type':'application/json' },
                body: JSON.stringify({name:newName})
            });
        }
        save(); renderAll();
    }

    // 刪除照片（僅本地）
    function deletePhoto() {
        let photo = state.photos.find(p=>p.id===state.activePhotoId);
        if(!photo) return;
        state.photos = state.photos.filter(p=>p.id!==photo.id);
        closeDetail();
        save(); renderAll();
    }

    // 刪除分類
    function deleteCategory(name) {
        state.customCategories = state.customCategories.filter(c=>c.name!==name);
        state.photos.forEach(p=>{ if(p.category===name) p.category='uncategorized'; });
        save(); renderAll();
    }

    // 搜尋包含日期區間
    function filterPhotos() {
        let q = document.getElementById('searchInput').value.trim().toLowerCase();
        let photos = [...state.photos];
        // 日期區間解析：支援 2024-01..2024-03 或 2024-01-01 至 2024-02-28
        let dateRange = null;
        let rangeMatch = q.match(/(\d{4}-\d{2}-\d{2})\s*(至|\.\.)\s*(\d{4}-\d{2}-\d{2})/);
        if(rangeMatch) {
            let start = new Date(rangeMatch[1]), end = new Date(rangeMatch[3]);
            if(!isNaN(start)&&!isNaN(end)) dateRange = {start,end};
        }
        // 篩選分類
        if(state.activeCat==='all') {}
        else if(state.activeCat==='uncategorized') photos = photos.filter(p=>p.category==='uncategorized');
        else photos = photos.filter(p=>p.category===state.activeCat);
        // 文字搜尋
        if(q && !dateRange) {
            photos = photos.filter(p=> 
                p.name.toLowerCase().includes(q) ||
                (p.exif?.Model||'').toLowerCase().includes(q) ||
                (p.exif?.LensModel||'').toLowerCase().includes(q)
            );
        } else if(dateRange) {
            photos = photos.filter(p=>{
                let d = getPhotoDate(p);
                return d>=dateRange.start && d<=dateRange.end;
            });
        }
        // 自訂相機/鏡頭篩選（側邊欄勾選效果，此處簡化為如果 activeCat 是 camera:xxx 或 lens:xxx）
        if(state.activeCat.startsWith('camera:')) {
            let model = state.activeCat.replace('camera:','');
            photos = photos.filter(p=> p.exif?.Model===model);
        } else if(state.activeCat.startsWith('lens:')) {
            let lens = state.activeCat.replace('lens:','');
            photos = photos.filter(p=> p.exif?.LensModel===lens);
        }
        // 排序
        photos.sort((a,b)=>{
            if(document.getElementById('sortSelect').value==='date-desc') return new Date(b.dateAdded)-new Date(a.dateAdded);
            if(document.getElementById('sortSelect').value==='date-asc') return new Date(a.dateAdded)-new Date(b.dateAdded);
            if(document.getElementById('sortSelect').value==='name') return a.name.localeCompare(b.name);
            return 0;
        });
        return photos;
    }

    function getPhotoDate(p) {
        if(p.exif?.DateTimeOriginal) return new Date(p.exif.DateTimeOriginal);
        if(p.exif?.CreateDate) return new Date(p.exif.CreateDate);
        return new Date(p.dateAdded);
    }

    // 渲染網格
    function renderGrid() {
        let grid = document.getElementById('photoGrid');
        grid.innerHTML = '';
        let photos = filterPhotos();
        photos.forEach(p => {
            let card = document.createElement('div');
            card.className = 'card';
            card.draggable = true;
            card.dataset.id = p.id;
            card.addEventListener('click', (e)=> { if(!e.target.closest('.del-btn')) openDetail(p.id); });
            card.addEventListener('dragstart', e=>{ e.dataTransfer.setData('text/plain', p.id); });
            card.innerHTML = `
                <div class="thumb">${p.thumbUrl ? `<img src="${p.thumbUrl}">` : '🦜'}</div>
                <div class="info">
                    <div class="title">${p.name}</div>
                    <div class="meta">${p.exif?.Model||''} ${p.exif?.FocalLength||''}mm</div>
                </div>
                <div class="del-btn" onclick="event.stopPropagation(); deletePhotoById('${p.id}')">✕</div>
            `;
            grid.appendChild(card);
        });
    }

    window.deletePhotoById = function(id) {
        state.photos = state.photos.filter(p=>p.id!==id);
        if(state.activePhotoId===id) closeDetail();
        save(); renderAll();
    };

    // 側邊欄渲染
    function renderSidebar() {
        document.getElementById('countAll').textContent = state.photos.length;
        document.getElementById('countUncat').textContent = state.photos.filter(p=>p.category==='uncategorized').length;
        
        let customDiv = document.getElementById('customCats');
        customDiv.innerHTML = state.customCategories.map(cat => {
            let count = state.photos.filter(p=>p.category===cat.name).length;
            return `<div class="cat-item" data-cat="${cat.name}" draggable="true">
                <span>🐦 ${cat.name}</span>
                <span class="count">${count}</span>
                <span class="del-cat" onclick="event.stopPropagation(); deleteCategory('${cat.name}')">✕</span>
            </div>`;
        }).join('');
        
        let cameraDiv = document.getElementById('cameraList');
        let cameraModels = [...new Set(state.photos.map(p=>p.exif?.Model).filter(Boolean))];
        state.cameraFilters.forEach(f => { if(!cameraModels.includes(f)) cameraModels.push(f); });
        cameraDiv.innerHTML = cameraModels.map(m => `<div class="cat-item" data-cat="camera:${m}">📷 ${m}</div>`).join('');
        
        let lensDiv = document.getElementById('lensList');
        let lensModels = [...new Set(state.photos.map(p=>p.exif?.LensModel).filter(Boolean))];
        state.lensFilters.forEach(f => { if(!lensModels.includes(f)) lensModels.push(f); });
        lensDiv.innerHTML = lensModels.map(l => `<div class="cat-item" data-cat="lens:${l}">🔭 ${l}</div>`).join('');
        
        // 綁定點擊
        document.querySelectorAll('.sidebar .cat-item').forEach(el => {
            el.onclick = () => {
                state.activeCat = el.dataset.cat;
                document.querySelectorAll('.cat-item').forEach(e=>e.classList.remove('active'));
                el.classList.add('active');
                renderGrid();
            };
            // 拖曳重新排序分類
            el.addEventListener('dragover', e=> e.preventDefault());
            el.addEventListener('drop', e=>{
                e.preventDefault();
                let fromCat = e.dataTransfer.getData('text/plain');
                let toCat = el.dataset.cat;
                if(fromCat && toCat && fromCat!==toCat) {
                    // 交換自訂分類順序（僅限於customCats）
                    let fromIdx = state.customCategories.findIndex(c=>c.name===fromCat);
                    let toIdx = state.customCategories.findIndex(c=>c.name===toCat);
                    if(fromIdx!==-1 && toIdx!==-1) {
                        let tmp = state.customCategories[fromIdx];
                        state.customCategories.splice(fromIdx,1);
                        state.customCategories.splice(toIdx,0,tmp);
                        save(); renderAll();
                    }
                }
            });
        });
    }

    // 詳情面板
    function openDetail(id) {
        state.activePhotoId = id;
        let p = state.photos.find(p=>p.id===id);
        if(!p) return;
        document.getElementById('detailPanel').classList.remove('hidden');
        document.getElementById('detailName').value = p.name;
        document.getElementById('detailImg').src = p.thumbUrl || '';
        let link = document.getElementById('originalLink');
        if(p.fileRef) {
            link.href = URL.createObjectURL(p.fileRef);
            link.style.display = 'block';
        } else if(p.driveId && state.google.token) {
            link.href = `https://www.googleapis.com/drive/v3/files/${p.driveId}?alt=media&access_token=${state.google.token}`;
            link.style.display = 'block';
        } else link.style.display = 'none';
        
        let sel = document.getElementById('detailCat');
        sel.innerHTML = '<option value="uncategorized">未分類</option>'+
            state.customCategories.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
        sel.value = p.category;
        
        let exifDiv = document.getElementById('exifInfo');
        if(p.exif) {
            let rows = [];
            if(p.exif.Model) rows.push(`<div class="exif-row"><span>相機</span><span>${p.exif.Model}</span></div>`);
            if(p.exif.LensModel) rows.push(`<div class="exif-row"><span>鏡頭</span><span>${p.exif.LensModel}</span></div>`);
            if(p.exif.FocalLength) rows.push(`<div class="exif-row"><span>焦距</span><span>${p.exif.FocalLength}mm</span></div>`);
            if(p.exif.FNumber) rows.push(`<div class="exif-row"><span>光圈</span><span>f/${p.exif.FNumber}</span></div>`);
            if(p.exif.ExposureTime) rows.push(`<div class="exif-row"><span>快門</span><span>${p.exif.ExposureTime}s</span></div>`);
            if(p.exif.ISO) rows.push(`<div class="exif-row"><span>ISO</span><span>${p.exif.ISO}</span></div>`);
            exifDiv.innerHTML = rows.join('') || '無 EXIF 資料';
        } else exifDiv.innerHTML = '無 EXIF 資料';
    }

    function closeDetail() {
        document.getElementById('detailPanel').classList.add('hidden');
        state.activePhotoId = null;
    }

    function changeCategory() {
        let p = state.photos.find(p=>p.id===state.activePhotoId);
        if(p) { p.category = document.getElementById('detailCat').value; save(); renderAll(); }
    }

    // 分類管理
    function addCategory() {
        let name = prompt('輸入新分類名稱：');
        if(name && !state.customCategories.find(c=>c.name===name)) {
            state.customCategories.push({name});
            save(); renderAll();
        }
    }
    window.addFilter = function(type) {
        let name = prompt(`輸入要新增的${type==='camera'?'相機':'鏡頭'}型號：`);
        if(name) {
            if(type==='camera') state.cameraFilters.push(name);
            else state.lensFilters.push(name);
            save(); renderAll();
        }
    };

    // Google Drive OAuth
    window.openDriveAuth = () => document.getElementById('driveModal').style.display='flex';
    window.startDriveAuth = () => {
        let cid = document.getElementById('clientIdInput').value.trim();
        let fid = document.getElementById('folderIdInput').value.trim();
        if(!cid) { alert('請輸入 OAuth 2.0 用戶端 ID'); return; }
        state.google.clientId = cid;
        state.google.folderId = fid;
        localStorage.setItem(STORAGE_KEY, JSON.stringify({...JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'), google:state.google}));
        google.accounts.id.initialize({
            client_id: cid,
            callback: (res) => {
                state.google.token = res.credential;
                document.getElementById('driveBtn').textContent = '✅ Drive 已連線';
                document.getElementById('driveModal').style.display='none';
                save();
            },
            scope: 'https://www.googleapis.com/auth/drive.file',
        });
        google.accounts.id.prompt();
    };

    // 事件綁定
    document.getElementById('fileInput').addEventListener('change', e=> {
        if(e.target.files.length) { handleUpload(e.target.files); e.target.value=''; }
    });
    document.getElementById('searchInput').addEventListener('input', renderGrid);
    window.addEventListener('dragover', e=> e.preventDefault());
    window.addEventListener('drop', e=> {
        e.preventDefault();
        let files = e.dataTransfer.files;
        if(files.length) handleUpload(files);
    });
    // 側邊欄拖曳接收照片分類
    document.querySelectorAll('.sidebar .cat-item').forEach(el => {
        el.addEventListener('dragover', e=> e.preventDefault());
        el.addEventListener('drop', e=> {
            e.preventDefault();
            let photoId = e.dataTransfer.getData('text/plain');
            let photo = state.photos.find(p=>p.id===photoId);
            if(photo && el.dataset.cat) {
                photo.category = el.dataset.cat.startsWith('camera:') || el.dataset.cat.startsWith('lens:') ? 'uncategorized' : el.dataset.cat;
                save(); renderAll();
            }
        });
    });

    function renderAll() {
        renderSidebar();
        renderGrid();
    }

    load();
    renderAll();
})();
</script>
</body>
</html>
