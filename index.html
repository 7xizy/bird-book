<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦜 鳥類圖鑑｜智慧搜尋與雲端同步</title>
  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif; background:#f7f3eb; color:#3e3a34; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    :root {
      --surface:#fff; --bg:#f7f3eb; --border:#e0d9cd; --accent:#5a8a6e; --accent-light:#e8f2ea;
      --danger:#b85450; --shadow:0 2px 8px rgba(0,0,0,0.06);
      --sidebar-w:260px; --detail-w:360px; --topbar-h:56px;
    }
    .topbar { height:var(--topbar-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0; z-index:10; }
    .logo { font-weight:700; font-size:1.2rem; color:var(--accent); display:flex; align-items:center; gap:4px; }
    .search-box { flex:1; max-width:520px; position:relative; display:flex; align-items:center; }
    .search-box input { width:100%; padding:8px 12px 8px 36px; border:2px solid var(--border); border-radius:40px; font-size:0.9rem; background:var(--bg); }
    .search-box .icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#999; }
    .search-box .date-btn { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:var(--surface); border:2px solid var(--border); border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; }
    .btn { padding:6px 14px; border-radius:40px; border:2px solid var(--border); background:var(--surface); cursor:pointer; font-weight:600; font-size:0.85rem; display:flex; align-items:center; gap:4px; white-space:nowrap; }
    .btn:hover { background:var(--bg); }
    .btn.drive { background:#1a73e8; color:#fff; border-color:#1a73e8; }
    .main { display:flex; flex:1; overflow:hidden; }
    .sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); overflow-y:auto; padding:12px 8px; flex-shrink:0; }
    .sidebar h4 { font-size:0.7rem; text-transform:uppercase; color:#999; margin:12px 8px 4px; }
    .cat-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:0.9rem; margin:2px 0; }
    .cat-item.active { background:var(--accent-light); font-weight:700; }
    .cat-item .count { margin-left:auto; background:#eee; padding:2px 8px; border-radius:20px; font-size:0.75rem; }
    .cat-item .del-cat { display:none; margin-left:4px; color:var(--danger); cursor:pointer; }
    .cat-item:hover .del-cat { display:inline; }
    .content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .toolbar { padding:8px 16px; display:flex; gap:8px; align-items:center; background:var(--bg); }
    .photo-grid { flex:1; overflow-y:auto; padding:12px; display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:12px; align-content:start; }
    .card { background:var(--surface); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; cursor:pointer; transition:0.2s; position:relative; }
    .card:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,0.1); }
    .card .thumb { width:100%; aspect-ratio:4/3; object-fit:cover; background:#ddd; display:flex; align-items:center; justify-content:center; font-size:2rem; position:relative; }
    .card .thumb img { width:100%; height:100%; object-fit:cover; }
    .card .raw-badge { position:absolute; bottom:4px; right:4px; background:rgba(0,0,0,0.7); color:#ffcc00; font-size:0.6rem; padding:2px 6px; border-radius:10px; }
    .card .info { padding:8px 10px; }
    .card .title { font-weight:600; font-size:0.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card .meta { font-size:0.7rem; color:#888; margin-top:2px; }
    .card .del-btn { position:absolute; top:6px; right:6px; background:rgba(255,255,255,0.9); border-radius:50%; width:24px; height:24px; display:none; align-items:center; justify-content:center; color:var(--danger); font-weight:bold; }
    .card:hover .del-btn { display:flex; }
    .detail-panel { width:var(--detail-w); background:var(--surface); border-left:1px solid var(--border); overflow-y:auto; flex-shrink:0; transition:0.3s; }
    .detail-panel.hidden { width:0; overflow:hidden; border:none; }
    .detail-header { padding:12px; display:flex; gap:8px; align-items:center; border-bottom:1px solid var(--border); }
    .detail-header input { flex:1; padding:6px 10px; border:2px solid var(--border); border-radius:6px; }
    .detail-img { width:100%; aspect-ratio:4/3; object-fit:contain; background:#111; }
    .detail-section { padding:12px; border-bottom:1px solid #eee; }
    .exif-row { display:flex; justify-content:space-between; padding:4px 0; font-size:0.85rem; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:999; }
    .modal-box { background:#fff; padding:20px; border-radius:16px; width:90%; max-width:460px; }
    .date-range-popup { position:absolute; top:50px; right:0; background:#fff; border:2px solid var(--border); border-radius:12px; padding:12px; box-shadow:var(--shadow); z-index:50; display:none; }
    .date-range-popup input { margin:4px; padding:6px; border:2px solid var(--border); border-radius:8px; }
    .modal-box input, .modal-box select { width:100%; padding:8px; margin:4px 0; border:2px solid #ddd; border-radius:8px; }
  </style>
</head>
<body>
<div class="topbar">
  <div class="logo">🦜 鳥類圖鑑</div>
  <div class="search-box" style="position:relative;">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="名稱/相機/鏡頭 或 年份(2024) 月份(2024-03) 區間">
    <span class="date-btn" id="dateBtn" title="日期區間選擇">📅</span>
    <div class="date-range-popup" id="datePopup">
      <label>開始日期</label>
      <input type="date" id="dateStart">
      <label>結束日期</label>
      <input type="date" id="dateEnd">
      <div style="display:flex; gap:6px; margin-top:8px;">
        <button class="btn" onclick="applyDateRange()" style="flex:1;">套用</button>
        <button class="btn" onclick="clearDateRange()">清除</button>
      </div>
    </div>
  </div>
  <button class="btn" onclick="document.getElementById('fileInput').click()">📁 上傳</button>
  <input type="file" id="fileInput" multiple accept="image/*,.arw,.cr2,.cr3,.nef,.dng,.orf,.rw2,.pef,.raf,.srw,.heic,.tiff,.tif" hidden>
  <button class="btn drive" onclick="openDriveSettings()">🔗 Google Drive</button>
  <button class="btn" onclick="toggleSidebar()">☰</button>
</div>

<div class="main">
  <aside class="sidebar" id="sidebar">
    <h4>📂 分類</h4>
    <div class="cat-item active" data-cat="all">📷 全部照片 <span class="count" id="countAll">0</span></div>
    <div class="cat-item" data-cat="uncategorized">❓ 未分類 <span class="count" id="countUncat">0</span></div>
    <div id="customCats"></div>
    <button class="btn" style="width:100%; margin-top:6px;" onclick="addCategory()">＋ 新增分類</button>
    <h4>📸 相機</h4>
    <div id="cameraList"></div>
    <button class="btn" style="width:100%;" onclick="addFilter('camera')">＋ 新增相機條件</button>
    <h4>🔭 鏡頭</h4>
    <div id="lensList"></div>
    <button class="btn" style="width:100%;" onclick="addFilter('lens')">＋ 新增鏡頭條件</button>
  </aside>

  <div class="content">
    <div class="toolbar">
      <select id="sortSelect" onchange="renderGrid()">
        <option value="date-desc">最新優先</option>
        <option value="date-asc">最舊優先</option>
        <option value="name">名稱排序</option>
      </select>
      <span style="margin-left:auto; font-size:0.8rem; color:#888;">💡 拖曳照片到分類可移動</span>
    </div>
    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <aside class="detail-panel hidden" id="detailPanel">
    <div class="detail-header">
      <input type="text" id="detailName" placeholder="照片名稱">
      <button class="btn" onclick="renamePhoto()">💾 儲存</button>
      <button class="btn" onclick="closeDetail()">✕</button>
    </div>
    <img class="detail-img" id="detailImg" src="" alt="">
    <a id="originalLink" target="_blank" style="display:block; text-align:center; color:var(--accent); padding:4px;">🔍 查看原始照片</a>
    <div class="detail-section">
      <select id="detailCat" onchange="changeCategory()"><option value="uncategorized">未分類</option></select>
      <button class="btn" style="color:var(--danger); margin-top:8px;" onclick="deletePhoto()">🗑️ 刪除照片 (僅本地)</button>
    </div>
    <div class="detail-section" id="exifInfo">點擊照片查看 EXIF</div>
  </aside>
</div>

<!-- Drive 設定 (API Key) -->
<div class="modal" id="driveModal" style="display:none;">
  <div class="modal-box">
    <h3>🔗 從 Google Drive 載入</h3>
    <label>資料夾 ID</label>
    <input type="text" id="folderIdInput" placeholder="從資料夾網址複製">
    <label>API Key</label>
    <input type="text" id="apiKeyInput" placeholder="AIzaSy...">
    <p style="font-size:0.75rem; color:#888;">* 資料夾需設為「知道連結的人可檢視」</p>
    <button class="btn" style="background:var(--accent); color:#fff; width:100%; margin:8px 0;" onclick="loadFromDrive()">載入照片</button>
    <button class="btn" onclick="document.getElementById('driveModal').style.display='none'">取消</button>
  </div>
</div>

<script>
(function() {
  const STORAGE_KEY = 'birdGuide_v5';
  let state = {
    photos: [],
    customCategories: [],
    cameraFilters: [],
    lensFilters: [],
    activeCat: 'all',
    activePhotoId: null,
    drive: { folderId:'', apiKey:'' }
  };

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      photosMeta: state.photos.map(p => ({
        id:p.id, name:p.name, category:p.category, exif:p.exif, rawFormat:p.rawFormat,
        dateAdded:p.dateAdded, thumbUrl:(p.thumbUrl && !p.thumbUrl.startsWith('blob:'))?p.thumbUrl:null,
        fileName:p.fileName, fileSize:p.fileSize, isRaw:p.isRaw,
        driveFileId:p.driveFileId || null
      })),
      customCategories: state.customCategories,
      cameraFilters: state.cameraFilters,
      lensFilters: state.lensFilters,
      drive: state.drive
    }));
  }

  function load() {
    let saved = localStorage.getItem(STORAGE_KEY);
    if(saved) {
      let s = JSON.parse(saved);
      state.customCategories = s.customCategories || [];
      state.cameraFilters = s.cameraFilters || [];
      state.lensFilters = s.lensFilters || [];
      state.drive = s.drive || {folderId:'', apiKey:''};
      state.photos = (s.photosMeta||[]).map(p => ({
        ...p, fileRef:null, thumbUrl:p.thumbUrl||null
      }));
    }
  }

  function genId() { return 'p_'+Date.now()+'_'+Math.random().toString(36); }

  async function readExif(file) {
    try {
      return await exifr.parse(file, {
        pick:['Make','Model','LensModel','FocalLength','FNumber','ExposureTime',
              'ISO','DateTimeOriginal','CreateDate','ImageWidth','ImageHeight'],
        reviveValues:true
      });
    } catch(e) { return null; }
  }

  function formatShutterSpeed(seconds) {
    if (seconds === undefined || seconds === null || seconds === '') return '';
    const s = parseFloat(seconds);
    if (isNaN(s)) return seconds + '秒';
    if (s >= 1) return s + ' 秒';
    const denom = Math.round(1 / s);
    if (Math.abs(s - 1/denom) < 0.001) return `1/${denom} 秒`;
    return s.toFixed(4).replace(/0+$/,'') + ' 秒';
  }

  function getRawFormat(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    const map = {
      arw:'SONY ARW', cr2:'Canon CR2', cr3:'Canon CR3', nef:'Nikon NEF',
      dng:'Adobe DNG', orf:'Olympus ORF', rw2:'Panasonic RW2',
      pef:'Pentax PEF', raf:'Fujifilm RAF', srw:'Samsung SRW'
    };
    return map[ext] || null;
  }

  async function extractRawThumb(file) {
    try {
      const thumb = await exifr.thumbnail(file);
      if (thumb) {
        const blob = new Blob([thumb], { type: 'image/jpeg' });
        return URL.createObjectURL(blob);
      }
    } catch(e) {}
    return null;
  }

  // 處理上傳 (本機)
  async function handleUpload(files) {
    for(let file of files) {
      const id = genId();
      const raw = getRawFormat(file.name);
      const isRaw = !!raw;
      let exif = await readExif(file);
      let thumbUrl = null;
      if (isRaw) {
        thumbUrl = await extractRawThumb(file);
      } else if (file.type.startsWith('image/')) {
        thumbUrl = URL.createObjectURL(file);
      }
      const photo = {
        id, name:file.name, category:'uncategorized', thumbUrl,
        fileRef:file, exif, rawFormat:raw, isRaw,
        dateAdded:new Date().toISOString(),
        fileName:file.name, fileSize:file.size,
        driveFileId:null
      };
      state.photos.push(photo);
    }
    save(); renderAll();
  }

  // 從 Drive 載入 (先清除既有 Drive 照片)
  async function loadFromDrive() {
    const folderId = document.getElementById('folderIdInput').value.trim();
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    if(!folderId || !apiKey) { alert('請輸入資料夾 ID 與 API Key'); return; }
    state.drive = { folderId, apiKey };
    save();
    document.getElementById('driveModal').style.display = 'none';

    // 移除所有來自 Drive 的照片 (有 driveFileId 的)
    state.photos = state.photos.filter(p => !p.driveFileId);

    try {
      const params = new URLSearchParams({
        q: `'${folderId}' in parents`,
        key: apiKey,
        fields: 'files(id,name,mimeType,size,thumbnailLink,webContentLink,createdTime)',
        pageSize: 100
      });
      const res = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`);
      if(!res.ok) throw new Error(`API 錯誤 ${res.status}`);
      const data = await res.json();
      if(!data.files || data.files.length===0) { alert('資料夾中沒有圖片或 RAW 檔案'); renderAll(); return; }

      const imageFiles = data.files.filter(f =>
        f.mimeType?.startsWith('image/') || f.name.match(/\.(arw|cr2|cr3|nef|dng|orf|rw2|pef|raf|srw|jpg|jpeg|png|heic|tiff|tif)$/i)
      );

      // 去重：用 Set 記錄已加入的 driveFileId
      const addedDriveIds = new Set();

      for(const file of imageFiles) {
        if(addedDriveIds.has(file.id)) continue;   // 重複則略過
        addedDriveIds.add(file.id);

        const id = genId();
        const raw = getRawFormat(file.name);
        const thumbUrl = file.thumbnailLink || null;
        let exif = null;
        try {
          if(file.webContentLink) {
            exif = await exifr.parse(file.webContentLink, {
              pick:['Make','Model','LensModel','FocalLength','FNumber','ExposureTime','ISO','DateTimeOriginal','CreateDate'],
              reviveValues:true
            });
          }
        } catch(e){}
        const photo = {
          id, name:file.name, category:'uncategorized', thumbUrl,
          fileRef:null, exif, rawFormat:raw, isRaw:!!raw,
          dateAdded:file.createdTime || new Date().toISOString(),
          fileName:file.name, fileSize:file.size || 0,
          driveFileId:file.id
        };
        state.photos.push(photo);
      }
      save(); renderAll();
    } catch(e) { alert('載入失敗：'+e.message); }
  }

  // 搜尋＋篩選邏輯
  function getFilteredPhotos() {
    let q = document.getElementById('searchInput').value.trim();
    let photos = [...state.photos];

    // 分類篩選
    if(state.activeCat === 'uncategorized') photos = photos.filter(p=>p.category==='uncategorized');
    else if(state.activeCat.startsWith('camera:')) photos = photos.filter(p=>p.exif?.Model===state.activeCat.replace('camera:',''));
    else if(state.activeCat.startsWith('lens:')) photos = photos.filter(p=>p.exif?.LensModel===state.activeCat.replace('lens:',''));
    else if(state.activeCat !== 'all' && !state.activeCat.startsWith('camera:') && !state.activeCat.startsWith('lens:')) {
      photos = photos.filter(p=>p.category===state.activeCat);
    }

    if(!q) return sortPhotos(photos);

    // 嘗試解析日期區間 (YYYY-MM-DD 至 YYYY-MM-DD)
    const rangeRegex = /(\d{4}-\d{2}-\d{2})\s*(至|\.\.)\s*(\d{4}-\d{2}-\d{2})/;
    const rangeMatch = q.match(rangeRegex);
    if(rangeMatch) {
      const start = new Date(rangeMatch[1]);
      const end = new Date(rangeMatch[3]);
      if(!isNaN(start) && !isNaN(end)) {
        return sortPhotos(photos.filter(p => {
          const d = getPhotoDate(p);
          return d >= start && d <= end;
        }));
      }
    }

    // 嘗試解析單獨年份 YYYY
    const yearRegex = /^\d{4}$/;
    if(yearRegex.test(q)) {
      const year = parseInt(q);
      return sortPhotos(photos.filter(p => {
        const d = getPhotoDate(p);
        return d.getFullYear() === year;
      }));
    }

    // 嘗試解析單獨月份 YYYY-MM
    const monthRegex = /^(\d{4})-(\d{2})$/;
    const monthMatch = q.match(monthRegex);
    if(monthMatch) {
      const year = parseInt(monthMatch[1]);
      const month = parseInt(monthMatch[2]);
      return sortPhotos(photos.filter(p => {
        const d = getPhotoDate(p);
        return d.getFullYear() === year && (d.getMonth()+1) === month;
      }));
    }

    // 一般文字搜尋
    const lowerQ = q.toLowerCase();
    return sortPhotos(photos.filter(p =>
      p.name.toLowerCase().includes(lowerQ) ||
      (p.exif?.Model||'').toLowerCase().includes(lowerQ) ||
      (p.exif?.LensModel||'').toLowerCase().includes(lowerQ)
    ));
  }

  function sortPhotos(photos) {
    const sort = document.getElementById('sortSelect').value;
    if(sort==='date-desc') photos.sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded));
    else if(sort==='date-asc') photos.sort((a,b)=>new Date(a.dateAdded)-new Date(b.dateAdded));
    else if(sort==='name') photos.sort((a,b)=>a.name.localeCompare(b.name));
    return photos;
  }

  function getPhotoDate(p) {
    if(p.exif?.DateTimeOriginal) return new Date(p.exif.DateTimeOriginal);
    if(p.exif?.CreateDate) return new Date(p.exif.CreateDate);
    return new Date(p.dateAdded);
  }

  function renderGrid() {
    const grid = document.getElementById('photoGrid');
    grid.innerHTML = '';
    let photos = getFilteredPhotos();
    photos.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.draggable = true;
      card.dataset.id = p.id;
      card.addEventListener('click', e => { if(!e.target.closest('.del-btn')) openDetail(p.id); });
      card.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', p.id); });

      let thumbHTML = p.thumbUrl
        ? `<img src="${p.thumbUrl}" alt="">`
        : (p.isRaw
            ? `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#f0e9d8;"><span style="font-size:2rem;">📷</span><span style="font-size:0.7rem;color:#888;">${p.rawFormat||'RAW'}</span></div>`
            : '<span>🦜</span>');

      card.innerHTML = `
        <div class="thumb">
          ${thumbHTML}
          ${p.isRaw ? `<span class="raw-badge">${p.rawFormat||'RAW'}</span>` : ''}
        </div>
        <div class="info">
          <div class="title">${p.name}</div>
          <div class="meta">${p.exif?.Model||''} ${p.exif?.FocalLength||''}mm</div>
        </div>
        <div class="del-btn" onclick="event.stopPropagation(); window.deletePhotoById('${p.id}')">✕</div>
      `;
      grid.appendChild(card);
    });
  }

  window.deletePhotoById = function(id) {
    state.photos = state.photos.filter(p => p.id !== id);
    if(state.activePhotoId === id) closeDetail();
    save(); renderAll();
  };

  function renderSidebar() {
    document.getElementById('countAll').textContent = state.photos.length;
    document.getElementById('countUncat').textContent = state.photos.filter(p=>p.category==='uncategorized').length;
    
    const customDiv = document.getElementById('customCats');
    customDiv.innerHTML = state.customCategories.map(cat => {
      let count = state.photos.filter(p=>p.category===cat.name).length;
      return `<div class="cat-item" data-cat="${cat.name}" draggable="true">
        <span>🐦 ${cat.name}</span>
        <span class="count">${count}</span>
        <span class="del-cat" onclick="event.stopPropagation(); window.deleteCategory('${cat.name}')">✕</span>
      </div>`;
    }).join('');

    const cameraDiv = document.getElementById('cameraList');
    let cameraModels = [...new Set(state.photos.map(p=>p.exif?.Model).filter(Boolean))];
    state.cameraFilters.forEach(f => { if(!cameraModels.includes(f)) cameraModels.push(f); });
    cameraDiv.innerHTML = cameraModels.map(m => `<div class="cat-item" data-cat="camera:${m}">📷 ${m}</div>`).join('');

    const lensDiv = document.getElementById('lensList');
    let lensModels = [...new Set(state.photos.map(p=>p.exif?.LensModel).filter(Boolean))];
    state.lensFilters.forEach(f => { if(!lensModels.includes(f)) lensModels.push(f); });
    lensDiv.innerHTML = lensModels.map(l => `<div class="cat-item" data-cat="lens:${l}">🔭 ${l}</div>`).join('');

    document.querySelectorAll('.sidebar .cat-item').forEach(el => {
      el.onclick = (e) => {
        if(e.target.closest('.del-cat')) return;
        state.activeCat = el.dataset.cat;
        document.querySelectorAll('.cat-item').forEach(c=>c.classList.remove('active'));
        el.classList.add('active');
        renderGrid();
      };
      el.addEventListener('dragover', e => e.preventDefault());
      el.addEventListener('drop', e => {
        e.preventDefault();
        const fromCat = e.dataTransfer.getData('text/plain');
        const toCat = el.dataset.cat;
        if(fromCat && toCat && fromCat!==toCat) {
          const fromIdx = state.customCategories.findIndex(c=>c.name===fromCat);
          const toIdx = state.customCategories.findIndex(c=>c.name===toCat);
          if(fromIdx!==-1 && toIdx!==-1) {
            const tmp = state.customCategories[fromIdx];
            state.customCategories.splice(fromIdx,1);
            state.customCategories.splice(toIdx,0,tmp);
            save(); renderAll();
          }
        }
      });
    });
  }

  window.deleteCategory = function(name) {
    state.customCategories = state.customCategories.filter(c=>c.name!==name);
    state.photos.forEach(p=>{ if(p.category===name) p.category='uncategorized'; });
    save(); renderAll();
  };

  window.addCategory = function() {
    const name = prompt('輸入新分類名稱：');
    if(name && !state.customCategories.find(c=>c.name===name)) {
      state.customCategories.push({name});
      save(); renderAll();
    }
  };

  window.addFilter = function(type) {
    const name = prompt(`輸入要新增的${type==='camera'?'相機':'鏡頭'}型號：`);
    if(name) {
      if(type==='camera') state.cameraFilters.push(name);
      else state.lensFilters.push(name);
      save(); renderAll();
    }
  };

  function openDetail(id) {
    state.activePhotoId = id;
    const p = state.photos.find(p=>p.id===id);
    if(!p) return;
    document.getElementById('detailPanel').classList.remove('hidden');
    document.getElementById('detailName').value = p.name;
    const img = document.getElementById('detailImg');
    if(p.thumbUrl) img.src = p.thumbUrl;
    else img.src = '';
    const link = document.getElementById('originalLink');
    if(p.fileRef) {
      link.href = URL.createObjectURL(p.fileRef);
      link.style.display = 'block';
    } else if(p.driveFileId && state.drive.apiKey) {
      link.href = `https://www.googleapis.com/drive/v3/files/${p.driveFileId}?alt=media&key=${state.drive.apiKey}`;
      link.style.display = 'block';
    } else {
      link.style.display = 'none';
    }

    const sel = document.getElementById('detailCat');
    sel.innerHTML = '<option value="uncategorized">未分類</option>'+
      state.customCategories.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
    sel.value = p.category;

    const exifDiv = document.getElementById('exifInfo');
    if(p.exif) {
      let rows = [];
      if(p.exif.Model) rows.push(`<div class="exif-row"><span>相機</span><span>${p.exif.Model}</span></div>`);
      if(p.exif.LensModel) rows.push(`<div class="exif-row"><span>鏡頭</span><span>${p.exif.LensModel}</span></div>`);
      if(p.exif.FocalLength) rows.push(`<div class="exif-row"><span>焦距</span><span>${p.exif.FocalLength}mm</span></div>`);
      if(p.exif.FNumber) rows.push(`<div class="exif-row"><span>光圈</span><span>f/${p.exif.FNumber}</span></div>`);
      if(p.exif.ExposureTime !== undefined) rows.push(`<div class="exif-row"><span>快門</span><span>${formatShutterSpeed(p.exif.ExposureTime)}</span></div>`);
      if(p.exif.ISO) rows.push(`<div class="exif-row"><span>ISO</span><span>${p.exif.ISO}</span></div>`);
      exifDiv.innerHTML = rows.join('') || '無 EXIF 資料';
    } else {
      exifDiv.innerHTML = '無 EXIF 資料';
    }
  }

  function closeDetail() {
    document.getElementById('detailPanel').classList.add('hidden');
    state.activePhotoId = null;
  }

  window.renamePhoto = function() {
    const p = state.photos.find(p=>p.id===state.activePhotoId);
    if(!p) return;
    const newName = document.getElementById('detailName').value.trim();
    if(newName) { p.name = newName; save(); renderAll(); }
  };

  window.changeCategory = function() {
    const p = state.photos.find(p=>p.id===state.activePhotoId);
    if(p) { p.category = document.getElementById('detailCat').value; save(); renderAll(); }
  };

  window.deletePhoto = function() {
    const p = state.photos.find(p=>p.id===state.activePhotoId);
    if(p) {
      state.photos = state.photos.filter(ph=>ph.id!==p.id);
      closeDetail();
      save(); renderAll();
    }
  };

  // 日曆區間功能
  document.getElementById('dateBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    const popup = document.getElementById('datePopup');
    popup.style.display = (popup.style.display === 'block') ? 'none' : 'block';
  });

  window.applyDateRange = function() {
    const start = document.getElementById('dateStart').value;
    const end = document.getElementById('dateEnd').value;
    if(start && end) {
      document.getElementById('searchInput').value = `${start} 至 ${end}`;
    } else if(start) {
      document.getElementById('searchInput').value = start;
    } else if(end) {
      document.getElementById('searchInput').value = end;
    }
    document.getElementById('datePopup').style.display = 'none';
    renderGrid();
  };

  window.clearDateRange = function() {
    document.getElementById('dateStart').value = '';
    document.getElementById('dateEnd').value = '';
    document.getElementById('searchInput').value = '';
    document.getElementById('datePopup').style.display = 'none';
    renderGrid();
  };

  // 點擊頁面空白處關閉日曆
  document.addEventListener('click', function(e) {
    const popup = document.getElementById('datePopup');
    const btn = document.getElementById('dateBtn');
    if (!popup.contains(e.target) && e.target !== btn) {
      popup.style.display = 'none';
    }
  });

  // Drive 視窗
  window.openDriveSettings = function() {
    document.getElementById('folderIdInput').value = state.drive.folderId || '';
    document.getElementById('apiKeyInput').value = state.drive.apiKey || '';
    document.getElementById('driveModal').style.display = 'flex';
  };
  window.loadFromDrive = loadFromDrive;

  // 事件綁定
  document.getElementById('fileInput').addEventListener('change', e => {
    if(e.target.files.length) { handleUpload(e.target.files); e.target.value=''; }
  });
  document.getElementById('searchInput').addEventListener('input', renderGrid);
  window.addEventListener('dragover', e => e.preventDefault());
  window.addEventListener('drop', e => {
    e.preventDefault();
    if(e.dataTransfer.files.length) handleUpload(e.dataTransfer.files);
  });
  document.querySelectorAll('.sidebar .cat-item').forEach(el => {
    el.addEventListener('dragover', e => e.preventDefault());
    el.addEventListener('drop', e => {
      e.preventDefault();
      const photoId = e.dataTransfer.getData('text/plain');
      const photo = state.photos.find(p=>p.id===photoId);
      if(photo && el.dataset.cat) {
        const cat = el.dataset.cat;
        if(!cat.startsWith('camera:') && !cat.startsWith('lens:')) {
          photo.category = cat;
          save(); renderAll();
        }
      }
    });
  });

  function renderAll() {
    renderSidebar();
    renderGrid();
  }

  // 初始化
  load();
  renderAll();
})();
</script>
</body>
</html>
